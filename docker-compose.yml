version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cocoa_tracker
      POSTGRES_USER: cocoa_user
      POSTGRES_PASSWORD: cocoa_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: cocoa_tracker_secret_2024
      PGHOST: postgres
      PGUSER: cocoa_user
      PGPASSWORD: cocoa_pass
      PGDATABASE: cocoa_tracker
      PGPORT: 5432
      PGSSL: false
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
